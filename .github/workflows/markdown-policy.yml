name: Markdown Policy

on:
  pull_request:
    paths:
      - '**.md'
      - '.claude/**'
      - 'context/**'
      - 'memory/**'
      - 'todos/**'
      - 'scripts/check-markdown-policy.sh'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run markdown policy checker
        run: |
          chmod +x scripts/check-markdown-policy.sh
          ./scripts/check-markdown-policy.sh
